name: Commit Lint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install conventional-pre-commit
        run: pip install conventional-pre-commit==4.4.0

      - name: Validate PR commit messages
        run: |
          git log --format="%H" "origin/${{ github.base_ref }}..HEAD" | \
          while IFS= read -r sha; do
            git log --format="%B" -n 1 "$sha" > /tmp/commit_msg
            conventional-pre-commit \
              --scopes auth,api,tools,models,scope,resources,dev,docs,chore,ci \
              build chore ci docs feat fix perf refactor revert style test \
              /tmp/commit_msg || {
                echo "❌ Invalid commit message in $sha:"
                git log --format="%s" -n 1 "$sha"
                exit 1
              }
          done
